syntax = "proto3";

package guessinggame;

service GameService {
  rpc JoinGame(JoinGameRequest) returns (JoinGameResponse);
  rpc StartGame(StartGameRequest) returns (CommandResponse);
  rpc SendPublicHint(SendPublicHintRequest) returns (CommandResponse);
  rpc SubmitGuess(SubmitGuessRequest) returns (CommandResponse);
  rpc ValidateGuess(ValidateGuessRequest) returns (CommandResponse);
  rpc PassGuessOpportunity(PassGuessOpportunityRequest) returns (CommandResponse);
  rpc RequestHintExchange(RequestHintExchangeRequest) returns (CommandResponse);
  rpc RespondHintExchange(RespondHintExchangeRequest) returns (CommandResponse);
  rpc SpyOnExchange(SpyOnExchangeRequest) returns (CommandResponse);
  rpc VoteForNextRound(VoteForNextRoundRequest) returns (CommandResponse);
  rpc LeaveGame(LeaveGameRequest) returns (CommandResponse);
  rpc SubscribeToGameEvents(SubscribeRequest) returns (stream GameEvent);
}

service ChatService {
  rpc SendChatMessage(ChatMessageRequest) returns (CommandResponse);
  rpc SubscribeToChatEvents(SubscribeRequest) returns (stream ChatEvent);
}

enum GameEventType {
  GAME_EVENT_UNKNOWN = 0;
  PLAYER_JOINED = 1;
  GAME_STARTED = 2;
  PUBLIC_HINT_SENT = 3;
  GUESS_SUBMITTED = 4;
  GUESS_VALIDATED = 5;
  HINT_EXCHANGE_REQUESTED = 6;
  HINT_EXCHANGE_RESPONDED = 7;
  HINT_EXCHANGE_OCCURRED = 8;
  SPY_ATTEMPTED = 9;
  SCORE_UPDATED = 10;
  OBJECT_ASSIGNED = 11;
  TURN_STARTED = 12;
  GUESS_PHASE_STARTED = 13;
  GUESS_OPPORTUNITY_PASSED = 14;
  HINT_PHASE_STARTED = 15;
  ROUND_STARTED = 16;
  CHARACTER_ASSIGNED = 17;
  GAME_ENDED = 18;
  ROUND_ENDED = 19;
  VOTE_STARTED = 20;
  VOTE_CAST = 21;
  NEW_ROUND_STARTED = 22;
  EXCHANGE_COMPLETED = 23;
  SPY_CAUGHT = 24;
  GUESS_ACCEPTED = 25;
  GUESS_REJECTED = 26;
  SPY_SUCCESSFUL = 27;
  SPY_DISCOVERED = 28;
  ROUND_SCORE_SUMMARY = 29;
  FINAL_RANKING = 30;
  PENDING_GUESS_FOR_OWNER = 31;
  PLAYER_LEFT = 32;
  NEW_GAME_APPROVED = 33;
}

enum TurnPhase {
  TURN_PHASE_UNKNOWN = 0;
  PRE_HINT_GUESS = 1;
  HINT = 2;
  POST_HINT_GUESSES = 3;
}

message Player {
  string player_id = 1;
  string name = 2;
}

message CharacterReveal {
  string player_id = 1;
  string player_name = 2;
  string character_name = 3;
  string character_id = 4;
}

message RankingEntry {
  int32 position = 1;
  string player_id = 2;
  string player_name = 3;
  int32 score = 4;
  int32 points_this_round = 5;
}

message JoinGameRequest {
  string player_name = 1;
}

message JoinGameResponse {
  bool success = 1;
  string message = 2;
  string player_id = 3;
  repeated Player players = 4;
  string room_owner_id = 5;
}

message SubscribeRequest {
  string player_id = 1;
}

message CommandResponse {
  bool success = 1;
  string message = 2;
}

message GameEvent {
  GameEventType type = 1;
  string message = 2;
  string actor_player_id = 3;
  string target_player_id = 4;
  int64 timestamp_unix_ms = 5;
  string object_name = 6;
  string theme = 7;
  string current_turn_player_id = 8;
  string current_turn_player_name = 9;
  string public_hint = 10;
  TurnPhase turn_phase = 11;
  repeated Player players = 12;
  string guess_id = 13;
  string guess_text = 14;
  string guesser_player_name = 15;
  string owner_player_name = 16;
  bool accepted = 17;
  repeated PlayerScore scores = 18;
  string category_id = 19;
  string category_name = 20;
  string character_id = 21;
  string image_path = 22;
  int32 max_rounds = 23;
  repeated PlayerGuesses remaining_guesses = 24;
  int32 round_number = 25;
  string room_owner_id = 26;
  repeated PlayerScore score_deltas = 27;
  bool vote_continue = 28;
  int32 votes_continue = 29;
  int32 votes_end = 30;
  int32 votes_needed = 31;
  string private_hint = 32;
  bool spy_caught = 33;
  string owner_player_id = 34;
  repeated CharacterReveal character_reveals = 35;
  int32 score_delta = 36;
  int32 hint_cycle = 37;
  int32 max_hint_cycles = 38;
  repeated RankingEntry ranking = 39;
  int32 guess_order = 40;
  int32 session_number = 41;
  bool is_final_session = 42;
}

message PlayerScore {
  string player_id = 1;
  string player_name = 2;
  int32 score = 3;
}

message PlayerGuesses {
  string player_id = 1;
  string player_name = 2;
  int32 guesses_left = 3;
}

message StartGameRequest {
  string player_id = 1;
  int32 max_rounds = 2;
  int32 max_turns = 3;
}

message SendPublicHintRequest {
  string player_id = 1;
  string hint = 2;
}

message SubmitGuessRequest {
  string guesser_player_id = 1;
  string owner_player_id = 2;
  string guess = 3;
}

message PassGuessOpportunityRequest {
  string player_id = 1;
}

message ValidateGuessRequest {
  string owner_player_id = 1;
  string guess_id = 2;
  bool accepted = 3;
}

message RequestHintExchangeRequest {
  string requester_player_id = 1;
  string target_player_id = 2;
  string private_hint = 3;
}

message RespondHintExchangeRequest {
  string responder_player_id = 1;
  string requester_player_id = 2;
  bool accepted = 3;
  string private_hint = 4;
}

message SpyOnExchangeRequest {
  string spy_player_id = 1;
  string player_a_id = 2;
  string player_b_id = 3;
}

message VoteForNextRoundRequest {
  string player_id = 1;
  bool continue_playing = 2;
}

message LeaveGameRequest {
  string player_id = 1;
}

message ChatMessageRequest {
  string player_id = 1;
  string text = 2;
}

message ChatEvent {
  string player_id = 1;
  string player_name = 2;
  string text = 3;
  int64 timestamp_unix_ms = 4;
}
